<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上同儕觀課回饋意見表</title>
<style>
  :root{
    --ink:#1f2a44;
    --ink-soft:#556077;
    --paper:#eaf0f8;
    --panel:#ffffff;
    --line:#c9d6e4;
    --accent:#2f6690;
    --accent-soft:#dce8f2;
    --record:#a8443a;
    --record-soft:#f6e6e3;
    --ok:#2f6690;
    --warn:#b8863b;
    --warn-soft:#f7ecd9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }
  header{
    background:var(--ink);
    color:#fff;
    padding:20px 18px 24px;
  }
  header h1{
    margin:0 0 4px;
    font-size:1.2rem;
    font-weight:700;
    letter-spacing:.02em;
  }
  header p{
    margin:0;
    font-size:.85rem;
    color:#c7d0d6;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;}
  .gate{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-top:-14px;
    box-shadow:0 6px 18px rgba(34,48,63,.08);
  }
  .gate label{
    display:block;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:6px;
    color:var(--ink-soft);
  }
  .gate input{
    width:100%;
    padding:12px 14px;
    font-size:1rem;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fbfbf9;
  }
  .gate button{
    margin-top:12px;
    width:100%;
    padding:13px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
  }
  .gate .hint{font-size:.78rem;color:var(--ink-soft);margin-top:8px;}

  #app{display:none;}

  .progress-bar{
    position:sticky;top:0;z-index:5;
    background:var(--paper);
    padding:10px 16px 8px;
    border-bottom:1px solid var(--line);
  }
  .progress-bar .track{
    height:6px;background:var(--line);border-radius:3px;overflow:hidden;
  }
  .progress-bar .fill{height:100%;background:var(--accent);width:0%;transition:width .3s;}
  .progress-bar .label{font-size:.72rem;color:var(--ink-soft);margin-top:4px;}

  .resume-banner{
    margin:14px 0;padding:14px;background:var(--warn-soft);border:1px solid var(--warn);
    border-radius:10px;font-size:.85rem;color:#6b4f1f;display:none;
  }

  .section-title{
    margin:26px 0 10px;
    font-size:1rem;
    font-weight:700;
    color:var(--accent);
    padding-bottom:6px;
    border-bottom:2px solid var(--accent-soft);
  }

  .qcard{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
    position:relative;
  }
  .qcard.done{border-color:var(--ok);}
  .qtext{
    font-size:.98rem;
    font-weight:600;
    margin:4px 0 12px;
    color:var(--ink);
  }
  .qtext .opt{
    font-weight:400;
    font-size:.8rem;
    color:var(--ink-soft);
  }
  .status-chip{
    position:absolute;top:14px;right:14px;
    font-size:.7rem;
    padding:2px 8px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:700;
    display:none;
  }
  .status-chip.show{display:inline-block;}

  textarea, input[type=text], select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:.92rem;
    font-family:inherit;
    background:#fbfbf9;
    color:var(--ink);
  }
  textarea{min-height:80px;resize:vertical;}

  .radio-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
  .radio-list.inline{flex-direction:row;flex-wrap:wrap;}
  .radio-list label{
    display:flex;align-items:flex-start;gap:8px;
    font-size:.92rem;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fbfbf9;
    cursor:pointer;
  }
  .radio-list input[type=radio]{margin-top:3px;width:18px;height:18px;flex-shrink:0;}

  .likert-wrap{margin-top:4px;}
  .likert-scale{
    display:flex;justify-content:space-between;align-items:center;gap:4px;
  }
  .likert-scale .col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
  .likert-scale .col input{width:20px;height:20px;}
  .likert-scale .col span{font-size:.75rem;color:var(--ink-soft);}
  .likert-labels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink-soft);margin-top:6px;}

  .controls{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .rec-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:9px 14px;
    border-radius:20px;
    border:1px solid var(--record);
    background:var(--record-soft);
    color:var(--record);
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
  }
  .rec-btn.active{
    background:var(--record);
    color:#fff;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;background:var(--record);
    display:inline-block;
  }
  .rec-btn.active .dot{background:#fff;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .send-btn{
    padding:9px 16px;
    border-radius:20px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:#fff;
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
  }
  .send-btn:disabled{opacity:.5;cursor:default;}

  .batch-submit-wrap{
    text-align:center;
    margin:6px 0 30px;
  }
  .batch-submit-wrap .send-btn{
    padding:12px 28px;
    font-size:.95rem;
  }

  audio{
    display:block;
    width:100%;
    margin-top:10px;
    height:34px;
  }
  .rec-time{font-size:.8rem;color:var(--record);font-weight:700;min-width:44px;}

  footer.note{
    max-width:640px;margin:20px auto 40px;padding:0 16px;
    font-size:.75rem;color:var(--ink-soft);
  }

  .modal-overlay{
    position:fixed;inset:0;background:rgba(34,48,63,.55);
    display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .modal-box{
    background:#fff;border-radius:14px;padding:22px;max-width:340px;width:100%;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
  }
  .modal-box p{margin:0 0 18px;font-size:.92rem;color:var(--ink);line-height:1.6;}
  .modal-box button{
    display:block;width:100%;margin-bottom:10px;padding:11px;border-radius:8px;
    border:1px solid var(--accent);background:var(--accent);color:#fff;
    font-weight:700;font-size:.88rem;cursor:pointer;
  }
  .modal-box button.secondary{background:#fff;color:var(--accent);}
  .modal-box button:last-child{margin-bottom:0;}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>線上同儕觀課回饋意見表</h1>
    <p>本問卷旨在評估總醫師教學能力並促進同儕交流。開放式問題可直接說話錄音，系統會自動轉出文字草稿；也可以直接打字回答。</p>
  </div>
</header>

<div class="wrap">
  <div class="gate" id="gate">
    <label for="codeInput">請輸入您的填答代碼</label>
    <input type="text" id="codeInput" placeholder="例如：同儕A、PEER01">
    <button onclick="startSession()">開始填答</button>
    <div class="hint">代碼由主辦單位提供，用來對應您這份紀錄，請勿使用真實姓名。若先前已用同一裝置、同一代碼填過，會自動載入先前的進度。</div>
  </div>
</div>

<div id="app">
  <div class="progress-bar">
    <div class="wrap" style="padding:0;">
      <div class="track"><div class="fill" id="progressFill"></div></div>
      <div class="label" id="progressLabel">已完成 0 / 0 題</div>
    </div>
  </div>

  <div class="wrap">
    <div class="resume-banner" id="resumeBanner"></div>
  </div>

  <div class="wrap" id="questionArea"></div>

  <div class="wrap">
    <div id="doneBanner" style="display:none;margin:20px 0;padding:16px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:12px;text-align:center;font-weight:700;color:var(--accent);">
      🎉 全部題目已送出，感謝您的填答，可以關閉此頁面了。
    </div>
  </div>

  <footer class="note">
    每一項送出後即會上傳保存。若中途離開頁面，重新用同一裝置、同一填答代碼打開此網址，先前已送出的題目會標示「已送出」，未完成的題目也會提醒您繼續填答（此記錄僅存在目前這個瀏覽器內，換裝置或清除瀏覽器資料會失效）。
  </footer>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0t1gdm5tjEc_jQcwWZfiDiBRuFdjBu4tAfA0Hc6oAmYExCX1jYxUp0lMRTTO0b-_w/exec";"
const STORAGE_KEY = "peerObsSurveyProgress_v2";

// ---------- 一、基本資料（文字/選單，不需錄音，批次送出） ----------
const BASIC_INFO = [
  {section:"一、基本資料", id:"1", text:"姓名", type:"text", required:true},
  {section:"一、基本資料", id:"2", text:"性別", type:"radio", required:true,
    options:["男","女"]},
  {section:"一、基本資料", id:"3", text:"出生年（民國）", type:"text", required:true, numeric:true, maxLen:3},
  {section:"一、基本資料", id:"4", text:"出生月", type:"text", required:true, numeric:true, maxLen:2, min:1, max:12},
  {section:"一、基本資料", id:"5", text:"職級", type:"radio", required:true,
    options:["R4","R5"]},
  {section:"一、基本資料", id:"6", text:"受訓科別", type:"dropdown", required:true,
    options:["內科","外科","婦產科","小兒科","急診科","神經內科","骨科","整形外科","神經外科","泌尿科","家醫科","復健科","皮膚科","眼科","耳鼻喉科","麻醉科","核醫科","病理科","放射診斷科","放射腫瘤科","精神科","職業醫學科"]},
  {section:"一、基本資料", id:"7", text:"觀課教師代號", type:"text", required:true}
];

// ---------- 二、心得回饋（錄音，逐題送出） ----------
const FEEDBACK = [
  {section:"二、心得回饋", id:"1", text:"觀課後的心得或收穫", type:"record"},
  {section:"二、心得回饋", id:"2", text:"欣賞課程哪些優點？", type:"record"},
  {section:"二、心得回饋", id:"3", text:"承上題，請問您如何將這些優點或作法應用於您教授的課程？", type:"record"}
];

// ---------- 三、我對此次觀課的想法（量表，批次送出） ----------
const SCALE = [
  {section:"三、我對此次觀課的想法（量表）", id:"1", text:"此次觀課經驗與交流對我教學能力的精進有幫助。", type:"likert", required:true},
  {section:"三、我對此次觀課的想法（量表）", id:"2", text:"此次觀課與交流對我教學經驗的提升有幫助。", type:"likert", required:true},
  {section:"三、我對此次觀課的想法（量表）", id:"3", text:"運用「觀課紀錄表」可幫助我進行課程觀察。", type:"likert", required:true},
  {section:"三、我對此次觀課的想法（量表）", id:"4", text:"透過「觀課交流會」與教師們的對話對於教學經驗累積有幫助。", type:"likert", required:false, opt:"（若無機會對話，此題可免填）"},
  {section:"三、我對此次觀課的想法（量表）", id:"5", text:"觀課服務有持續經營的價值。", type:"likert", required:true, opt:"（業務內容包含觀課課程邀課、觀課媒合、觀課交流會等）"}
];

// ---------- 四、我對此次觀課經驗與過程的建議（錄音，逐題送出） ----------
const SUGGESTION = [
  {section:"四、我對此次觀課經驗與過程的建議", id:"1", text:"有甚麼技巧或知識是我學習到可應用於未來的課程？", type:"record"},
  {section:"四、我對此次觀課經驗與過程的建議", id:"2", text:"有甚麼問題是觀課者或是觀課過程中可以避免的？", type:"record"},
  {section:"四、我對此次觀課經驗與過程的建議", id:"3", text:"有甚麼學習或教學工具或媒材可以提供幫助？", type:"record"}
];

const ITEMS = [].concat(BASIC_INFO, FEEDBACK, SCALE, SUGGESTION);
const BASIC_START = 0;
const BASIC_END = BASIC_INFO.length - 1;
const SCALE_START = BASIC_INFO.length + FEEDBACK.length;
const SCALE_END = SCALE_START + SCALE.length - 1;
const REQUIRED_COUNT = ITEMS.filter(i => i.required !== false).length;
function isRequired(item){ return item.required !== false; }

let respondentCode = "";
let completedCount = 0;
let sessionStarted = false;
let savedProgress = {};

function loadAllProgress(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  }catch(e){
    return {};
  }
}
function saveAllProgress(all){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  }catch(e){}
}
function markItemDone(idx, value){
  const all = loadAllProgress();
  if(!all[respondentCode]) all[respondentCode] = {};
  all[respondentCode][idx] = {done:true, value: value || ""};
  saveAllProgress(all);
  savedProgress = all[respondentCode];
}

function startSession(){
  const val = document.getElementById('codeInput').value.trim();
  if(!val){
    alert("請先輸入填答代碼");
    return;
  }
  respondentCode = val;
  sessionStarted = true;
  const allProgress = loadAllProgress();
  savedProgress = allProgress[respondentCode] || {};

  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderItems();
  restoreProgress();
  updateProgress();
}

function renderItems(){
  const area = document.getElementById('questionArea');
  let lastSection = null;
  let html = "";

  ITEMS.forEach((item, idx) => {
    if(item.section !== lastSection){
      html += `<div class="section-title">${item.section}</div>`;
      lastSection = item.section;
    }

    html += `<div class="qcard" id="qcard-${idx}"><div class="status-chip" id="chip-${idx}">已送出</div>`;
    html += `<div class="qtext">${item.text}${item.opt ? ' <span class="opt">'+item.opt+'</span>' : ''}${item.required===false ? ' <span class="opt">（可免填）</span>' : ''}</div>`;

    if(item.type === 'text'){
      if(item.numeric){
        const minAttr = item.min!==undefined ? `data-min="${item.min}"` : '';
        const maxAttr = item.max!==undefined ? `data-max="${item.max}"` : '';
        const maxLenAttr = item.maxLen ? `maxlength="${item.maxLen}"` : '';
        html += `<input type="text" id="field-${idx}" inputmode="numeric" pattern="[0-9]*" ${maxLenAttr} ${minAttr} ${maxAttr} oninput="sanitizeNumeric(this)" onblur="clampNumeric(this)">`;
      } else {
        html += `<input type="text" id="field-${idx}">`;
      }
    }

    if(item.type === 'radio'){
      html += `<div class="radio-list inline">`;
      item.options.forEach((opt, oi) => {
        html += `<label><input type="radio" name="field-${idx}" value="${opt}"> ${opt}</label>`;
      });
      html += `</div>`;
    }

    if(item.type === 'dropdown'){
      html += `<select id="field-${idx}"><option value="">請選擇</option>`;
      item.options.forEach((opt) => {
        html += `<option value="${opt}">${opt}</option>`;
      });
      html += `</select>`;
    }

    if(item.type === 'likert'){
      html += `<div class="likert-wrap">
        <div class="likert-scale">
          ${[1,2,3,4,5].map(n => `<div class="col"><input type="radio" name="field-${idx}" value="${n}"><span>${n}</span></div>`).join('')}
        </div>
        <div class="likert-labels"><span>非常不同意</span><span>非常同意</span></div>
      </div>`;
    }

    if(item.type === 'record'){
      html += `<textarea id="text-${idx}" placeholder="可直接打字，或按下方按鈕開始錄音自動產生文字草稿"></textarea>`;
      html += `<div class="controls">
        <button class="rec-btn" id="recbtn-${idx}" onclick="toggleRecord(${idx})">
          <span class="dot"></span><span id="recbtn-label-${idx}">開始錄音</span>
        </button>
        <span class="rec-time" id="rectime-${idx}"></span>
        <button class="send-btn" id="sendbtn-${idx}" onclick="sendAnswer(${idx})">送出這一題</button>
      </div>
      <audio id="audio-${idx}" controls style="display:none;"></audio>`;
    }

    html += `</div>`;

    if(idx === BASIC_END){
      html += `<div class="batch-submit-wrap">
        <button class="send-btn" id="batchbtn-basic" onclick="sendBatch(${BASIC_START}, ${BASIC_END}, 'batchbtn-basic')">送出基本資料</button>
      </div>`;
    }
    if(idx === SCALE_END){
      html += `<div class="batch-submit-wrap">
        <button class="send-btn" id="batchbtn-scale" onclick="sendBatch(${SCALE_START}, ${SCALE_END}, 'batchbtn-scale')">送出量表結果</button>
      </div>`;
    }
  });

  area.innerHTML = html;
}

function restoreProgress(){
  const entries = Object.keys(savedProgress);
  if(entries.length === 0) return;

  entries.forEach(idxStr => {
    const idx = parseInt(idxStr, 10);
    const item = ITEMS[idx];
    if(!item) return;
    const rec = savedProgress[idxStr];
    if(!rec || !rec.done) return;

    if(item.type === 'text'){
      const f = document.getElementById('field-'+idx);
      if(f){
        f.value = rec.value;
        if(item.numeric){
          sanitizeNumeric(f);
          clampNumeric(f);
        }
      }
    } else if(item.type === 'dropdown'){
      const f = document.getElementById('field-'+idx);
      if(f) f.value = rec.value;
    } else if(item.type === 'radio' || item.type === 'likert'){
      const box = document.querySelector(`input[name="field-${idx}"][value="${rec.value}"]`);
      if(box) box.checked = true;
    } else if(item.type === 'record'){
      const t = document.getElementById('text-'+idx);
      if(t) t.value = rec.value;
    }

    const card = document.getElementById('qcard-'+idx);
    if(card) card.classList.add('done');
    const chip = document.getElementById('chip-'+idx);
    if(chip) chip.classList.add('show');
    if(isRequired(item)) completedCount++;
  });

  const doneCount = completedCount;
  const remain = REQUIRED_COUNT - doneCount;
  if(doneCount > 0){
    const banner = document.getElementById('resumeBanner');
    banner.style.display = 'block';
    banner.textContent = `偵測到您先前已完成 ${doneCount} 題，尚有 ${remain} 題未完成，請繼續往下填答。（已完成的題目仍可重新編輯後再次送出）`;
  }
}

// ---- 選擇視窗（文字/錄音衝突時使用） ----
function showChoiceModal(message, choices){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const box = document.createElement('div');
    box.className = 'modal-box';
    const p = document.createElement('p');
    p.textContent = message;
    box.appendChild(p);
    choices.forEach((c, i) => {
      const btn = document.createElement('button');
      if(i>0) btn.classList.add('secondary');
      btn.textContent = c.label;
      btn.onclick = () => { document.body.removeChild(overlay); resolve(c.value); };
      box.appendChild(btn);
    });
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  });
}

// ---- recording state per question ----
const recState = {};

function getRecognitionClass(){
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

async function toggleRecord(idx){
  if(!recState[idx]) recState[idx] = {recording:false};
  const st = recState[idx];

  if(!st.recording){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      st.stream = stream;
      st.chunks = [];

      const mimeCandidates = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus'];
      let chosenMime = '';
      for(const m of mimeCandidates){
        if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)){
          chosenMime = m; break;
        }
      }
      const extMap = {'audio/mp4':'m4a','audio/webm':'webm','audio/ogg':'ogg'};
      const baseMime = chosenMime.split(';')[0];
      st.mimeType = chosenMime || 'audio/webm';
      st.fileExt = extMap[baseMime] || 'webm';

      st.mediaRecorder = chosenMime ? new MediaRecorder(stream,{mimeType:chosenMime}) : new MediaRecorder(stream);
      st.mediaRecorder.ondataavailable = e => { if(e.data.size>0) st.chunks.push(e.data); };
      st.mediaRecorder.onstop = () => {
        const blob = new Blob(st.chunks, {type: st.mimeType});
        st.audioBlob = blob;
        const audioEl = document.getElementById('audio-'+idx);
        audioEl.src = URL.createObjectURL(blob);
        audioEl.style.display = 'block';
        stream.getTracks().forEach(t=>t.stop());
      };
      st.mediaRecorder.start();

      const RecClass = getRecognitionClass();
      if(RecClass){
        st.recognition = new RecClass();
        st.recognition.lang = 'zh-TW';
        st.recognition.continuous = true;
        st.recognition.interimResults = true;
        st.baseText = document.getElementById('text-'+idx).value;
        if(st.baseText) st.baseText += " ";
        st.recognition.onresult = (e) => {
          let finalT = "";
          let interimT = "";
          for(let i=0;i<e.results.length;i++){
            if(e.results[i].isFinal) finalT += e.results[i][0].transcript;
            else interimT += e.results[i][0].transcript;
          }
          document.getElementById('text-'+idx).value = st.baseText + finalT + interimT;
        };
        st.recognition.onerror = () => {};
        st.recognition.start();
      }

      st.recording = true;
      st.startTime = Date.now();
      st.timerInt = setInterval(()=>{
        const sec = Math.floor((Date.now()-st.startTime)/1000);
        const m = String(Math.floor(sec/60)).padStart(2,'0');
        const s = String(sec%60).padStart(2,'0');
        document.getElementById('rectime-'+idx).textContent = m+':'+s;
      },500);

      document.getElementById('recbtn-'+idx).classList.add('active');
      document.getElementById('recbtn-label-'+idx).textContent = "停止錄音";
    }catch(err){
      alert("無法使用麥克風，請確認已允許瀏覽器存取麥克風權限。");
    }
  } else {
    document.getElementById('recbtn-'+idx).classList.remove('active');
    document.getElementById('recbtn-label-'+idx).textContent = "處理錄音中...";
    document.getElementById('recbtn-'+idx).disabled = true;
    document.getElementById('sendbtn-'+idx).disabled = true;

    if(st.recognition) st.recognition.stop();
    clearInterval(st.timerInt);
    st.recording = false;

    await new Promise(resolve => {
      if(st.mediaRecorder && st.mediaRecorder.state !== 'inactive'){
        st.mediaRecorder.addEventListener('stop', resolve, {once:true});
        st.mediaRecorder.stop();
      } else {
        resolve();
      }
    });

    document.getElementById('recbtn-'+idx).disabled = false;
    document.getElementById('sendbtn-'+idx).disabled = false;
    document.getElementById('recbtn-label-'+idx).textContent = "重新錄音";
  }
}

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function sanitizeNumeric(el){
  el.value = el.value.replace(/[^0-9]/g,'');
}
function clampNumeric(el){
  if(el.value === '') return;
  let v = parseInt(el.value, 10);
  if(isNaN(v)){ el.value = ''; return; }
  const min = el.dataset.min !== undefined ? parseInt(el.dataset.min,10) : undefined;
  const max = el.dataset.max !== undefined ? parseInt(el.dataset.max,10) : undefined;
  if(min !== undefined && v < min) v = min;
  if(max !== undefined && v > max) v = max;
  el.value = v;
}

function getBasicValue(idx, item){
  if(item.type === 'text' || item.type === 'dropdown'){
    const f = document.getElementById('field-'+idx);
    return f ? f.value.trim() : "";
  }
  if(item.type === 'radio' || item.type === 'likert'){
    const box = document.querySelector(`input[name="field-${idx}"]:checked`);
    return box ? box.value : "";
  }
  return "";
}

async function postToSheet(item, text, audioBlob, mimeType, fileExt){
  const formData = new FormData();
  formData.append('respondentCode', respondentCode);
  formData.append('section', item.section);
  formData.append('questionId', item.id);
  formData.append('questionText', item.text);
  formData.append('transcriptText', text);

  if(audioBlob){
    const base64 = await blobToBase64(audioBlob);
    formData.append('audioBase64', base64);
    formData.append('audioMime', mimeType || 'audio/webm');
    formData.append('audioExt', fileExt || 'webm');
  }

  await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    mode:'no-cors',
    body: formData
  });
}

async function sendAnswer(idx){
  const item = ITEMS[idx];
  const st = recState[idx] || {};

  if(item.type === 'record' && st.recording){
    alert("請先按「停止錄音」，再送出這一題。");
    return;
  }

  let text = document.getElementById('text-'+idx).value.trim();
  let audioBlob = st.audioBlob || null;
  const hasText = text.length > 0;
  const hasAudio = !!audioBlob;

  if(hasText && hasAudio){
    const choice = await showChoiceModal(
      "偵測到這一題同時有文字內容與錄音檔，僅能擇一上傳，請選擇：",
      [
        {label:"只上傳文字（不上傳錄音檔）", value:"text"},
        {label:"只上傳錄音檔（清空文字內容）", value:"audio"}
      ]
    );
    if(choice === "text"){
      audioBlob = null;
    } else {
      text = "";
    }
  }

  const btn = document.getElementById('sendbtn-'+idx);
  btn.disabled = true;
  btn.textContent = "送出中...";

  try{
    await postToSheet(item, text, audioBlob, st.mimeType, st.fileExt);
    const card = document.getElementById('qcard-'+idx);
    if(!card.classList.contains('done')){
      card.classList.add('done');
      if(isRequired(item)) completedCount++;
      updateProgress();
    }
    document.getElementById('chip-'+idx).classList.add('show');
    btn.textContent = audioBlob ? "已送出（含錄音檔），可再次修改送出" : "已送出（僅文字），可再次修改送出";
    markItemDone(idx, text || (audioBlob ? "（錄音檔，無文字草稿）" : ""));
  }catch(err){
    alert("送出失敗，請檢查網路連線後再試一次。");
    btn.textContent = "送出這一題";
  }
  btn.disabled = false;
}

async function sendBatch(startIdx, endIdx, btnId){
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  btn.textContent = "送出中...";

  let sentCount = 0;
  let skippedCount = 0;

  for(let idx = startIdx; idx <= endIdx; idx++){
    const item = ITEMS[idx];
    const text = getBasicValue(idx, item);

    if(!text){
      if(item.required === false){
        continue;
      }
      skippedCount++;
      continue;
    }

    try{
      await postToSheet(item, text, null, null, null);
      const card = document.getElementById('qcard-'+idx);
      if(!card.classList.contains('done')){
        card.classList.add('done');
        if(isRequired(item)) completedCount++;
      }
      document.getElementById('chip-'+idx).classList.add('show');
      markItemDone(idx, text);
      sentCount++;
    }catch(err){
      skippedCount++;
    }
  }

  updateProgress();
  btn.disabled = false;
  btn.textContent = (btnId === 'batchbtn-basic') ? "送出基本資料" : "送出量表結果";

  if(skippedCount > 0){
    alert(`已送出 ${sentCount} 項，尚有 ${skippedCount} 項未填寫，請填寫後再按一次按鈕送出。`);
  } else {
    alert(`已成功送出 ${sentCount} 項。`);
  }
}

function updateProgress(){
  const pct = Math.round((completedCount/REQUIRED_COUNT)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `已完成 ${completedCount} / ${REQUIRED_COUNT} 題`;
  if(completedCount >= REQUIRED_COUNT){
    document.getElementById('doneBanner').style.display = 'block';
  }
}

window.addEventListener('beforeunload', function(e){
  if(sessionStarted && completedCount < REQUIRED_COUNT){
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
